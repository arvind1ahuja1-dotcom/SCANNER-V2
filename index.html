<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

#scanner{
position:relative;
}

#reader{
min-height:0;
}
  
#reader video,
#reader img{
max-height:320px !important;
object-fit:contain;
}
  
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

input{
font-size:22px;
padding:10px;
margin:10px;
width:240px;
}

button{
font-size:22px;
padding:14px;
margin:10px;
}

.member{
display:flex;
justify-content:space-between;
align-items:center;
width:92%;
max-width:500px;
margin:10px auto;
font-size:24px;
padding:8px 10px;
}

.green{
background:#2e7d32;
color:white;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}

</style>

</head>

<body>

<div id="login">

<h2>Scanner Login</h2>

<input id="mobile" maxlength="10" inputmode="numeric"
placeholder="Mobile"
oninput="validateLogin()">

<br>

<input id="pin" maxlength="6" inputmode="numeric"
placeholder="PIN"
oninput="validateLogin()">

<br>

<button id="loginBtn"
onclick="login()"
disabled
style="background:#9ccc65;color:white">

OKAY

</button>

<p id="msg" style="color:red"></p>

</div>


<div id="scanner" style="display:none">

<h3 id="functionTitle"></h3>

<div id="pendingCounter" style="font-size:18px;color:#c62828;margin-bottom:10px"></div>

<div id="reader" style="width:320px;margin:auto;"></div>

<div id="familyCard"></div>

<div id="pinModal" style="
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.6);
z-index:9999;
justify-content:center;
align-items:center;
">

<div style="
background:white;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
">

<h3>Enter Host PIN</h3>

<div id="pinGuestInfo" style="margin-bottom:10px;font-size:14px;color:#555"></div>

<input id="hostPinInput"
type="tel"
inputmode="numeric"
maxlength="6"
placeholder="Enter 6-digit PIN"
style="width:90%;padding:10px;font-size:20px;text-align:center">

<br><br>

<button onclick="submitHostPin()" style="background:#2e7d32;color:white">
Submit
</button>

<button onclick="closePinModal()" style="background:#ccc">
Cancel
</button>

</div>
</div>

</div>


<script>

let lastScanned = "";

let scannerInstance=null;

let scannedFamilies = {};

let familyCache = {};

const API_URL="https://script.google.com/macros/s/AKfycbwfBi1pESnwh8ZMSDPLATpjZHEMV3npR6146FfdMOSrbXvTlJ7f7g4ZmG1dojHulhY/exec";

const SESSION_HOURS = 6;

let userName="";
let activeFunction="";

window.onload = function(){

let user = localStorage.getItem("scannerUser");
let time = localStorage.getItem("loginTime");

if(user && time){

let diff = (Date.now() - time) / 3600000;

if(diff < SESSION_HOURS){

userName = user;

document.getElementById("login").style.display="none";
document.getElementById("scanner").style.display="block";

loadFunction();

}

}

}

function validateLogin(){

let m=document.getElementById("mobile").value;
let p=document.getElementById("pin").value;
let btn=document.getElementById("loginBtn");

if(m.length==10 && p.length==6){

btn.disabled=false;
btn.style.background="#2e7d32";

}else{

btn.disabled=true;
btn.style.background="#9ccc65";

}

}


async function login(){

document.getElementById("msg").innerText="Connecting...";

let mobile=document.getElementById("mobile").value;
let pin=document.getElementById("pin").value;

try{

let res=await fetch(API_URL+"?action=login&mobile="+mobile+"&pin="+pin);

let data=await res.json();

if(!data.success){

document.getElementById("msg").innerText="Incorrect Mobile or PIN";
return;

}

userName=data.name;

/* SAVE SESSION */
localStorage.setItem("scannerUser", userName);
localStorage.setItem("loginTime", Date.now());

document.getElementById("login").style.display="none";
document.getElementById("scanner").style.display="block";

loadFunction();

}catch(err){

document.getElementById("msg").innerText="Connection error: "+err;

}

}
  
async function loadFunction(){

let res=await fetch(API_URL+"?action=active");

let data=await res.json();

if(!data.active){

alert("No active function");
return;

}

activeFunction=data.id;

document.getElementById("functionTitle").innerText=data.name;

resetScanner();

/* preload attendance log */
await preloadAttendance();
await preloadFamilies();
await loadPendingCount();
  
}

let scanLock=false;
  

async function onScan(decoded){

if(scanLock) return;

scanLock = true;

let lines = (decoded || "").split("\n");
let familyId = (lines[0] || "").replace("\r","").trim();

/* ignore repeated scans of same QR */
if(familyId === lastScanned){
scanLock = false;
return;
}

lastScanned = familyId;

/* invalid QR check */

if(!familyId.startsWith("FAM")){
showInvalidQR();
scanLock=false;
return;
}

/* duplicate check */

if(scannedFamilies[familyId]){
showDuplicateMessage(scannedFamilies[familyId]);
scanLock=false;
return;
}

/* collapse camera box */
collapseCamera();

if(familyCache[familyId]){
  renderFamily(familyCache[familyId]);
} else {
  await loadFamily(familyId);
}
  
/* ✅ VERY IMPORTANT */
setTimeout(()=>{
  scanLock = false;
}, 300);

}


async function loadFamily(fid){

let res;
try{
res=await fetch(API_URL+"?action=family&family="+fid+"&func="+activeFunction);
}catch(err){
alert("Network error. Please scan again.");
resetScanner();
return;
}

let data=await res.json();

if(!data || !data.members){
alert("Unable to load family data");
resetScanner();
return;
}

renderFamily(data);

}

function renderFamily(data){

window.currentPrimaryName = data.members[0]?.name || "";

let html=`
<div class="familyCard">

<h3 style="margin-bottom:25px">
${data.members.length ? data.members[0].name : ""} ${data.familyName} Family
</h3>

<div style="margin-bottom:18px;font-size:18px;font-weight:bold;color:#673ab7">
Absent Guest? Tap Name to Remove Tick
</div>
`;

data.members.forEach((m,i)=>{

let isAttending = m.attending;

let bgColor = isAttending ? "#ffffff" : "#fdecea";   // light red
let textColor = isAttending ? "#000000" : "#c62828"; // dark red

html+=`
<label class="member" style="background:${bgColor}; border-radius:8px;">
  <span style="color:${textColor}; font-weight:${isAttending ? "normal" : "bold"};">
    ${m.name}
  </span>
  <input 
    type="checkbox" 
    ${isAttending ? "checked" : ""} 
    data-expected="${isAttending ? "true" : "false"}"
    id="m${i}">
</label>
`;

});

html+=`
<div style="display:flex;justify-content:space-between;margin-top:25px">

<button
onclick="openGuestPanel()"
style="
background:#ed6c02;
color:white;
padding:14px 20px;
border:none;
font-size:20px;
border-radius:8px
">
+ GUESTS
</button>

<button
onclick="submit('${data.family}','${data.familyName}')"
style="
background:#2e7d32;
color:white;
padding:14px 20px;
border:none;
font-size:24px;
border-radius:8px
">
SUBMIT
</button>

</div>
`;

document.getElementById("familyCard").innerHTML=html;

}
  
async function submit(fid,fname){

let boxes=document.querySelectorAll("input[type=checkbox]");

let names=[];                 // ALL selected
let approvedNames=[];         // ONLY expected guests
let pendingGuests=[];         // NEED approval

let expected = 0;
let arrivedExpected = 0;
let extraGuests = 0;

boxes.forEach(b=>{

  let isExpected = b.dataset.expected === "true";

  let parent = b.closest(".member");
  let name = parent ? parent.querySelector("span").innerText.trim() : "";

  if(isExpected){
    expected++;
  }

  if(b.checked){

    names.push(name);

    if(isExpected){
      arrivedExpected++;
      approvedNames.push(name);
    }else{
      extraGuests++;
      pendingGuests.push(name);
    }

  }

});

if(names.length === 0){
  alert("Please select at least one guest.");
  return;
}

let primaryName = window.currentPrimaryName || "";

// 🔴 HANDLE EXTRA GUESTS (PIN OR PENDING)

let approvedExtraGuests = [];

if(pendingGuests.length > 0){

  let proceed = confirm(
  "Unregistered Guest(s):\n\n" +
  pendingGuests.join(", ") + " (" + fname + ")" +
  "\n\nPress OK to Enter PIN\nPress Cancel to Send for Approval"
);

if(proceed){
  openPinModal(pendingGuests,fname);
  return; // STOP here → wait for PIN
}
  
  function proceedSubmitAfterPin(){

  // re-trigger submit without pending guests
  submit(currentFamilyId,currentFamilyName);

}

  if(usePin){

    let pin = <input type="tel" inputmode="numeric" maxlength="6">;

    if(pin){

      let res = await fetch(API_URL+"?action=verifyHostPin&pin="+pin);
      let data = await res.json();

      if(data.success){

        approvedExtraGuests = pendingGuests;

      }else{

        alert("Invalid PIN. Guests will be sent for approval.");

      }

    }

  }

  // Remaining unapproved → pending
  let stillPending = pendingGuests.filter(n => !approvedExtraGuests.includes(n));

  if(stillPending.length > 0){

    await fetch(API_URL,{
      method:"POST",
      body: JSON.stringify({
        action:"requestApproval",
        func:activeFunction,
        family:fid,
        familyName:fname,
        guests:stillPending,
        device:userName
      })
    });

  }

}

//
// ✅ CLEAN PAYLOAD (NO EXTRA CODE INSIDE)
//
let payload={
  action:"submit",
  func:activeFunction,
  family:fid,
  primary: primaryName,
  familyName:fname,
  registered: expected,
  arrived: arrivedExpected,
  extra: approvedExtraGuests.length,
  names:approvedNames.concat(approvedExtraGuests).join(", "),
  device:userName,
  method:"QR Scan"
};

//
// ✅ FIRE AND FORGET (FAST)
//
fetch(API_URL,{
  method:"POST",
  body:JSON.stringify(payload)
}).catch(err => console.log("Write failed", err));

/* update local attendance cache */
scannedFamilies[fid]=names.join(", ");

/* prevent same QR from firing again */
lastScanned = fid;

let color;

if(extraGuests > 0){
  color = "#800020";
}else if(arrivedExpected < expected){
  color = "#ed6c02";
}else{
  color = "#2e7d32";
}

document.getElementById("familyCard").innerHTML = `

<div style="
background:${color};
color:white;
padding:40px;
border-radius:12px;
margin-top:20px;
text-align:center;
">

<h1 style="font-size:42px;margin-bottom:20px">
WELCOME
</h1>

<div style="font-size:26px;margin-bottom:30px">
${primaryName} ${fname} Family
</div>

<div style="font-size:22px;margin-bottom:20px">
${names.join(", ")}
</div>

<div style="font-size:20px;margin-bottom:25px;font-weight:bold;">
${
  extraGuests > 0
    ? `⚠ ${extraGuests} Unregistered Guest${extraGuests>1?"s":""}`
    : (arrivedExpected < expected
        ? `⚠ ${expected - arrivedExpected} Guest Missing`
        : `All Registered Guests Present`)
}
</div>

<button
style="
font-size:22px;
padding:14px 28px;
background:white;
border:none;
border-radius:8px;
cursor:pointer;
"
onclick="resetScanner()"
>
SCAN NEXT GUEST
</button>

</div>
`;

}

function collapseCamera(){

if(scannerInstance){
try{ scannerInstance.clear(); }catch(e){}
}

const reader = document.getElementById("reader");
reader.innerHTML="";
reader.style.height="0px";
}

function resetScanner(){

let warn = document.getElementById("dupWarning");
if(warn) warn.remove();

if(scannerInstance){
try{ scannerInstance.clear(); }catch(e){}
}

/* reset scan guards */
scanLock = false;
lastScanned = "";

document.getElementById("reader").style.height="320px";
  
document.getElementById("familyCard").innerHTML="";

/* show scanner controls again */
document.getElementById("reader").style.display="block";

/* clear scanner area */
const reader=document.getElementById("reader");
reader.innerHTML="";

/* recreate scanner UI but DO NOT auto-start camera */
scannerInstance = new Html5QrcodeScanner(
"reader",
{
fps:30,
qrbox:{width:320,height:320},
rememberLastUsedCamera:true,
supportedScanTypes:[
Html5QrcodeScanType.SCAN_TYPE_CAMERA,
Html5QrcodeScanType.SCAN_TYPE_FILE
],
formatsToSupport:[
Html5QrcodeSupportedFormats.QR_CODE
]
},
false
);

scannerInstance.render(onScan);

}

function showDuplicateMessage(names){

scanLock = true;

const container = document.getElementById("scanner");

let old = document.getElementById("dupWarning");
if(old) old.remove();

let msg = document.createElement("div");
msg.id="dupWarning";

msg.style.color="#c62828";
msg.style.fontSize="16px";
msg.style.fontWeight="bold";
msg.style.marginTop="8px";
msg.style.textAlign="center";
msg.style.position="absolute";
msg.style.top="75vh";
msg.style.left="0";
msg.style.right="0";
msg.style.zIndex="999";

msg.innerHTML =
`QR ALREADY SCANNED FOR ${document.getElementById("functionTitle").innerText}<br>
Guests Present: ${names}`;

container.appendChild(msg);

setTimeout(()=>{
msg.remove();
scanLock=false;
lastScanned = "";
},5000);

}

function showInvalidQR(){

scanLock = true;

const container = document.getElementById("scanner");

let old = document.getElementById("dupWarning");
if(old) old.remove();

let msg = document.createElement("div");
msg.id="dupWarning";

msg.style.color="#c62828";
msg.style.fontSize="16px";
msg.style.fontWeight="bold";
msg.style.marginTop="8px";
msg.style.textAlign="center";
msg.style.position="absolute";
msg.style.top="75vh";
msg.style.left="0";
msg.style.right="0";
msg.style.zIndex="999";

msg.innerHTML = `INVALID QR CODE`;

container.appendChild(msg);

setTimeout(()=>{
msg.remove();
scanLock=false;
},5000);

}

async function preloadAttendance(){

try{

let res = await fetch(API_URL+"?action=attendance&func="+activeFunction,{cache:"no-store"});
let data = await res.json();

/* store scanned families in memory */
scannedFamilies = {};

data.forEach(r=>{
scannedFamilies[r.family]=r.names;
});

return true; // ✅ ADD THIS LINE HERE (inside try, at the end)

}catch(err){
console.log("Attendance preload failed",err);
return false; // ✅ ALSO ADD THIS (important)
}

}

async function preloadFamilies(){

try{

let res = await fetch(API_URL+"?action=families&func="+activeFunction,{cache:"no-store"});
let data = await res.json();

familyCache = {};

data.forEach(f=>{
familyCache[f.family] = f;
});

return true; // ✅ ADD THIS LINE HERE (inside try, at the end)

}catch(err){
console.log("Family preload failed",err);
return false; // ✅ ALSO ADD THIS
}

}

async function loadPendingCount(){

  let res = await fetch(API_URL+"?action=getPending&func="+activeFunction);
  let data = await res.json();

  document.getElementById("pendingCounter").innerText =
    data.length > 0 ? "Pending 🔴 " + data.length : "";

}

let pendingGuestsGlobal = [];
let pendingFamilyGlobal = "";

function openPinModal(guests,familyName){
  pendingGuestsGlobal = guests;
  pendingFamilyGlobal = familyName;

  document.getElementById("pinGuestInfo").innerText =
    guests.join(", ") + " (" + familyName + ")";

  document.getElementById("hostPinInput").value = "";
  document.getElementById("pinModal").style.display = "flex";
}

function closePinModal(){
  document.getElementById("pinModal").style.display = "none";
}

async function submitHostPin(){

  let pin = document.getElementById("hostPinInput").value;

  if(pin.length !== 6){
    alert("Enter valid 6-digit PIN");
    return;
  }

  let res = await fetch(API_URL+"?action=verifyHostPin&pin="+pin);
  let data = await res.json();

  if(data.success){

    approvedExtraGuests = pendingGuestsGlobal;
    closePinModal();

    proceedSubmitAfterPin(); // continue flow

  }else{
    alert("Invalid PIN");
  }

}

</script>

</body>
</html>
