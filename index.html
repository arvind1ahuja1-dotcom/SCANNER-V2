<script>

let pendingInterval = null;

let lastScanned = "";

let scannerInstance=null;

let scannedFamilies = {};

let familyCache = {};

const API_URL="https://script.google.com/macros/s/AKfycbwfBi1pESnwh8ZMSDPLATpjZHEMV3npR6146FfdMOSrbXvTlJ7f7g4ZmG1dojHulhY/exec";

const SESSION_HOURS = 6;

let userName="";
let activeFunction="";
let userRole="";

let currentFamilyId = "";
let currentFamilyName = "";

let approvedOverrides = [];

let guestSearchMode = "scanner";
let enteredGuestName = "";

/* MASTER LIST OF EVERY PERSON CURRENTLY ON THE FAMILY SCREEN */
let displayedGuests = [];

window.onload = function(){

let user = localStorage.getItem("scannerUser");
let time = localStorage.getItem("loginTime");

if(user && time){

let diff = (Date.now() - time) / 3600000;

if(diff < SESSION_HOURS){

userName = user;
userRole = localStorage.getItem("scannerRole") || "";

document.getElementById("login").style.display="none";
document.getElementById("scanner").style.display="block";

loadFunction();

}

}

}

function validateLogin(){

let m=document.getElementById("mobile").value;
let p=document.getElementById("pin").value;
let btn=document.getElementById("loginBtn");

if(m.length==10 && p.length==6){

btn.disabled=false;
btn.style.background="#2e7d32";

}else{

btn.disabled=true;
btn.style.background="#9ccc65";

}

}


async function login(){

document.getElementById("msg").innerText="Connecting...";

let mobile=document.getElementById("mobile").value;
let pin=document.getElementById("pin").value;

try{

let res=await fetch(API_URL+"?action=login&mobile="+mobile+"&pin="+pin);

let data=await res.json();

if(!data.success){

document.getElementById("msg").innerText="Incorrect Mobile or PIN";
return;

}

userName=data.name;

userRole = data.role;
localStorage.setItem("scannerRole", userRole);

/* SAVE SESSION */
localStorage.setItem("scannerUser", userName);
localStorage.setItem("loginTime", Date.now());

document.getElementById("login").style.display="none";
document.getElementById("scanner").style.display="block";

loadFunction();

}catch(err){

document.getElementById("msg").innerText="Connection error: "+err;

}

}
  
async function loadFunction(){

let res=await fetch(API_URL+"?action=active");

let data=await res.json();

if(!data.active){

alert("No active function");
return;

}

activeFunction=data.id;

document.getElementById("functionTitle").innerText=data.name;

if(userRole === "HOST"){
  document.getElementById("hostControls").style.display="block";
}

resetScanner();

/* preload attendance log */
await preloadAttendance();
await preloadFamilies();
await loadPendingCount();

if(!pendingInterval){
  pendingInterval = setInterval(async ()=>{
    await preloadAttendance();
    await loadPendingCount();
  }, 2000);
}
  
}

let scanLock=false;
  

async function onScan(decoded){

if(scanLock) return;

scanLock = true;

let lines = (decoded || "").split("\n");
let familyId = (lines[0] || "").replace("\r","").trim();

/* ignore repeated scans of same QR */
if(familyId === lastScanned){
scanLock = false;
return;
}

lastScanned = familyId;

/* invalid QR check */

if(
  !familyId.startsWith("FAM") &&
  !familyId.startsWith("BAM")
){
showInvalidQR();
scanLock=false;
return;
}

/* duplicate check */

if(scannedFamilies[familyId]){
showDuplicateMessage(scannedFamilies[familyId]);
scanLock=false;
return;
}

/* collapse camera box */
collapseCamera();

if(familyCache[familyId]){
  renderFamily(familyCache[familyId]);
} else {
  await loadFamily(familyId);
}
  
/* ✅ VERY IMPORTANT */
setTimeout(()=>{
  scanLock = false;
}, 300);

}


async function loadFamily(fid){

let res;
try{
res=await fetch(API_URL+"?action=family&family="+fid+"&func="+activeFunction);
}catch(err){
alert("Network error. Please scan again.");
resetScanner();
return;
}

let data=await res.json();

if(!data || !data.members){
alert("Unable to load family data");
resetScanner();
return;
}

renderFamily(data);

}

function renderFamily(data){

document.getElementById("scannerGuestBtn").style.display="none";
  
window.currentPrimaryName = data.members[0]?.name || "";

displayedGuests = data.members.map(m => ({
    name: m.name,
    attending: m.attending,
    expected: m.attending,
    extra: false
}));

data.members = displayedGuests;

let html=`
<div class="familyCard">

<h3 style="margin-bottom:25px">
${data.members.length ? data.members[0].name : ""} ${data.familyName} Family
</h3>

<div style="margin-bottom:18px;font-size:18px;font-weight:bold;color:#673ab7">
Absent Guest? Tap Name to Remove Tick
</div>
`;

data.members.forEach((m,i)=>{

let isAttending = m.attending;

if (m.extra && typeof m.attending === "undefined") {
    isAttending = true;
}

let bgColor;

if (m.extra) {

  bgColor = "#ffd6e7";     // pink for extra guest

} else {

  bgColor = isAttending ? "#ffffff" : "#fdecea";//light red

}

let textColor = isAttending ? "#000000" : "#c62828";//dark red

html+=`
<label class="member" style="background:${bgColor}; border-radius:8px;">
  <span style="color:${textColor}; font-weight:${isAttending ? "normal" : "bold"};">
    ${m.name}
  </span>
  <input
    type="checkbox"
    ${isAttending ? "checked" : ""}
    data-expected="${m.expected ? "true" : "false"}"
    data-extra="${m.extra ? "true" : "false"}"
    id="m${i}">
</label>
`;

});

html+=`
<div style="
display:flex;
justify-content:space-between;
margin-top:25px;
">

<button
onclick="openGuestPanel()"
style="
background:#ed6c02;
color:white;
padding:14px 20px;
border:none;
font-size:20px;
border-radius:8px;
min-width:45%;
">
+ GUESTS
</button>

<button
onclick="submit('${data.family}','${data.familyName}')"
style="
background:#2e7d32;
color:white;
padding:14px 20px;
border:none;
font-size:22px;
border-radius:8px;
min-width:45%;
">
SUBMIT
</button>

</div>

<div style="margin-top:10px;">

<button
onclick="resetScanner()"
style="
width:88%;
display:block;
margin:0 auto;
background:#9e9e9e;
color:white;
padding:14px;
border:none;
font-size:20px;
border-radius:8px;
">
CANCEL
</button>

</div>
`;

document.getElementById("familyCard").innerHTML=html;

}
  
async function submit(fid, fname) {

  currentFamilyId = fid;
  currentFamilyName = fname;

  const primaryName = window.currentPrimaryName || "";

  const boxes = document.querySelectorAll(".member input[type=checkbox]");

  pendingGuestObjects = [];

  let names = [];
  let approvedNames = [];
  let pendingGuests = [];
  let absentGuests = [];

  let expected = 0;
  let arrivedExpected = 0;
  let extraGuests = 0;

  boxes.forEach(box => {

    const row = box.closest(".member");

    const name = row
      ? row.querySelector("span").innerText.trim()
      : "";

    const expectedGuest =
      box.dataset.expected === "true";

    if (expectedGuest) {

    expected++;

    if (box.checked) {

        names.push(name);

        approvedNames.push(name);

        arrivedExpected++;

    } else {

        absentGuests.push(name);

    }

} else {

    if (box.checked) {

    pendingGuests.push(name);

    pendingGuestObjects.push({

    name: name,

    extra: box.dataset.extra === "true",

    family: currentFamilyId,

    familyName: currentFamilyName

});

}

}

  });

  extraGuests = pendingGuestObjects.filter(g => g.extra).length;

  if (names.length === 0) {

    alert("Please select at least one guest.");

    return;

  }

  const payload = {

    action: "submit",

    func: activeFunction,

    family: fid,

    primary: primaryName,

    familyName: fname,

    registered: expected,

    arrived: arrivedExpected,

    extra: approvedOverrides.length,

    names: approvedNames.join(", "),

    device: userName,

    method: "QR Scan"

  };

  /*
  ============================================
  DECISION POINT
  ============================================

  IF THERE ARE RSVP-NO / EXTRA GUESTS
  DO NOT WRITE ANYTHING YET.

  Simply remember the payload and ask the
  doorman whether to Send To Host.

  Attendance Log will ONLY be written after
  SEND TO HOST is pressed.

  */

  if (pendingGuests.length > 0) {

    pendingGuestsGlobal =
        pendingGuestObjects.map(g => g.name);

    pendingFamilyGlobal = fname;

    window.pendingAttendancePayload = payload;

    openPinModal(pendingGuestsGlobal, fname);

    return;

}

  /*
  ============================================
  NO HOST APPROVAL REQUIRED
  Continue directly to Attendance Log.
  ============================================
  */

  let res = await fetch(API_URL, {

    method: "POST",

    body: JSON.stringify(payload)

  });

  let result = await res.json();

  if (result.duplicate) {

    showDuplicateMessage(names.join(", "));

    return;

  }

  scannedFamilies[fid] = names.join(", ");

  lastScanned = fid;

  scanLock = true;

  approvedOverrides = [];

  let color =
      (arrivedExpected < expected)
      ? "#ed6c02"
      : "#2e7d32";

  document.getElementById("familyCard").innerHTML = `

<div style="
background:${color};
color:white;
padding:40px;
border-radius:12px;
margin-top:20px;
text-align:center;
">

<h1 style="
font-size:42px;
margin-bottom:20px;
">
WELCOME
</h1>

<div style="
font-size:26px;
margin-bottom:30px;
">
${primaryName} ${fname} Family
</div>

<div style="
font-size:22px;
margin-bottom:20px;
">
${approvedNames.join(", ")}
</div>

<div style="
font-size:20px;
font-weight:bold;
margin-bottom:25px;
">

${
arrivedExpected < expected
?
`⚠ ${expected-arrivedExpected} Guest Missing`
:
`All Registered Guests Present`
}

</div>

<button
onclick="
scanLock=false;
resetScanner();
"
style="
font-size:22px;
padding:14px 28px;
background:white;
border:none;
border-radius:8px;
cursor:pointer;
">

SCAN NEXT GUEST

</button>

</div>

`;

return;

/* ==========================================================
   FROM HERE DOWN IS ONLY USED AFTER HOST HAS APPROVED
   (submitHostPin() calls submit() again after approval)
   ========================================================== */

}



function collapseCamera(){

if(scannerInstance){
try{ scannerInstance.clear(); }catch(e){}
}

const reader = document.getElementById("reader");
reader.innerHTML="";
reader.style.height="0px";
}

function resetScanner(){

let warn = document.getElementById("dupWarning");
if(warn) warn.remove();

if(scannerInstance){
try{ scannerInstance.clear(); }catch(e){}
}

/* reset scan guards */
scanLock = false;
lastScanned = "";
displayedGuests = [];

document.getElementById("reader").style.height="320px";

document.getElementById("scannerGuestBtn").style.display="inline-block";
  
document.getElementById("familyCard").innerHTML="";

/* show scanner controls again */
document.getElementById("reader").style.display="block";

/* clear scanner area */
const reader=document.getElementById("reader");
reader.innerHTML="";

/* recreate scanner UI but DO NOT auto-start camera */
scannerInstance = new Html5QrcodeScanner(
"reader",
{
fps:30,
qrbox:{width:320,height:320},
rememberLastUsedCamera:true,
supportedScanTypes:[
Html5QrcodeScanType.SCAN_TYPE_CAMERA,
Html5QrcodeScanType.SCAN_TYPE_FILE
],
formatsToSupport:[
Html5QrcodeSupportedFormats.QR_CODE
]
},
false
);

scannerInstance.render(onScan);

}

function showDuplicateMessage(names){

scanLock = true;

const container = document.getElementById("scanner");

let old = document.getElementById("dupWarning");
if(old) old.remove();

let msg = document.createElement("div");
msg.id="dupWarning";

msg.style.color="#c62828";
msg.style.fontSize="16px";
msg.style.fontWeight="bold";
msg.style.marginTop="8px";
msg.style.textAlign="center";
msg.style.position="absolute";
msg.style.top="75vh";
msg.style.left="0";
msg.style.right="0";
msg.style.zIndex="999";

msg.innerHTML =
`QR ALREADY SCANNED FOR ${document.getElementById("functionTitle").innerText}<br>
Guests Present: ${names}`;

container.appendChild(msg);

setTimeout(()=>{
msg.remove();
scanLock=false;
lastScanned = "";
},3000);

}

function showInvalidQR(){

scanLock = true;

const container = document.getElementById("scanner");

let old = document.getElementById("dupWarning");
if(old) old.remove();

let msg = document.createElement("div");
msg.id="dupWarning";

msg.style.color="#c62828";
msg.style.fontSize="16px";
msg.style.fontWeight="bold";
msg.style.marginTop="8px";
msg.style.textAlign="center";
msg.style.position="absolute";
msg.style.top="75vh";
msg.style.left="0";
msg.style.right="0";
msg.style.zIndex="999";

msg.innerHTML = `INVALID QR CODE`;

container.appendChild(msg);

setTimeout(()=>{
msg.remove();
scanLock=false;
},3000);

}

async function preloadAttendance(){

try{

let res = await fetch(API_URL+"?action=attendance&func="+activeFunction,{cache:"no-store"});
let data = await res.json();

/* store scanned families in memory */
scannedFamilies = {};

data.forEach(r=>{
scannedFamilies[r.family]=r.names;
});

return true; // ✅ ADD THIS LINE HERE (inside try, at the end)

}catch(err){
console.log("Attendance preload failed",err);
return false; // ✅ ALSO ADD THIS (important)
}

}

async function preloadFamilies(){

try{

let res = await fetch(API_URL+"?action=families&func="+activeFunction,{cache:"no-store"});
let data = await res.json();

familyCache = {};

data.forEach(f=>{
familyCache[f.family] = f;
});

return true; // ✅ ADD THIS LINE HERE (inside try, at the end)

}catch(err){
console.log("Family preload failed",err);
return false; // ✅ ALSO ADD THIS
}

}

async function loadPendingCount(){

  let res = await fetch(API_URL+"?action=getPending&func="+activeFunction);
  let data = await res.json();

  document.getElementById("pendingCounter").innerText =
  data.length > 0 ? "Pending 🔴 " + data.length : "No Pending";

}

let pendingData = [];

let approvalRefreshTimer = null;

async function openApprovalPanel(){

  document.getElementById("approvalPanel").style.display = "block";

  await loadApprovalPanel();

  if(!approvalRefreshTimer){

    approvalRefreshTimer = setInterval(async ()=>{

      if(
        document.getElementById("approvalPanel").style.display=="block"
      ){
        await loadApprovalPanel();
      }

    },2000);

  }

}

async function loadApprovalPanel(){

  let res = await fetch(
    API_URL + "?action=getPending&func=" + activeFunction,
    {cache:"no-store"}
  );

  let data = await res.json();

  pendingData = data;

  let html = "";

  data.forEach((g,index)=>{

    html += `

<label
style="
display:flex;
align-items:center;
padding:14px 12px;
border-bottom:1px solid #d9d9d9;
background:${index % 2 ? "#f7f7f7" : "#ffffff"};
cursor:pointer;
user-select:none;
">

<input
type="checkbox"
value="${g.row}"
style="
width:24px;
height:24px;
margin-right:14px;
flex-shrink:0;
">

<span
style="
flex:1;
font-size:22px;
text-align:left;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
">

${g.name} (${g.family})

</span>

</label>

`;

  });

  if(data.length==0){

    html=`

<div style="
padding:40px;
font-size:24px;
color:#2e7d32;
font-weight:bold;
text-align:center;
">

No Pending Guests

</div>

`;

  }

  document.getElementById("approvalList").innerHTML = html;

}

function closeApprovalPanel(){

  document.getElementById("approvalPanel").style.display="none";

  if(approvalRefreshTimer){

    clearInterval(approvalRefreshTimer);

    approvalRefreshTimer = null;

  }

}

function getSelectedRows(){
  return [...document.querySelectorAll("#approvalList input:checked")]
    .map(x=>parseInt(x.value));
}

let approvalAction = "";
let approvalRows = [];

function openPinModalForApproval(rows, action){
  approvalRows = rows;
  approvalAction = action;

  document.getElementById("pinGuestInfo").innerText =
    "Approve / Reject Selected Guests";

  document.getElementById("pinModal").style.display = "flex";
}

async function approveSelected(){

  let rows = getSelectedRows();

  if(rows.length === 0){
    alert("Select at least one");
    return;
  }

  closeApprovalPanel();
openPinModalForApproval(rows, "approve");
}

async function rejectSelected(){

  let rows = getSelectedRows();

  if(rows.length === 0){
    alert("Select at least one");
    return;
  }

  closeApprovalPanel();
openPinModalForApproval(rows, "reject");
}

let pendingGuestsGlobal = [];

let pendingGuestObjects = [];
  
let pendingFamilyGlobal = "";

function openPinModal(guests,familyName){
  pendingGuestsGlobal = guests;
  pendingFamilyGlobal = familyName;

  document.getElementById("pinGuestInfo").innerText =
    guests.join(", ") + " (" + familyName + ")";

  document.getElementById("hostPinInput").value = "";
  document.getElementById("pinModal").style.display = "flex";
}

function closePinModal(){
  document.getElementById("pinModal").style.display = "none";
}

async function sendToHostApproval(){

  /*
     FIRST write the Attendance Log.
     Only the YES guests (and any Host-approved overrides)
     are written.
  */

  if(window.pendingAttendancePayload){

console.log(JSON.stringify(pendingGuestObjects, null, 2));
    
    let res = await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify(window.pendingAttendancePayload)
    });

    let result = await res.json();

    if(result.duplicate){

      showDuplicateMessage(
        window.pendingAttendancePayload.names
      );

      return;

    }

  }

  /*
     NOW send the pending guest(s)
     to the Host for approval.
  */

  await fetch(API_URL,{
  method:"POST",
  body: JSON.stringify({

    action:"requestApproval",

    func:activeFunction,

    guests:pendingGuestObjects,

    device:userName

})
});

  closePinModal();

  /*
     Remember this family has already entered.
  */

  scannedFamilies[currentFamilyId] =
    window.pendingAttendancePayload
      ? window.pendingAttendancePayload.names
      : "";

  lastScanned = currentFamilyId;

  await loadPendingCount();

  document.getElementById("familyCard").innerHTML = `

async function submitHostPin(){

  let pin = document.getElementById("hostPinInput").value;

  if(pin.length !== 6){
    alert("Enter valid 6-digit PIN");
    return;
  }

  let res = await fetch(API_URL+"?action=verifyHostPin&pin="+pin);
  let data = await res.json();

  if(data.success){

  closePinModal();

  // 🔴 APPROVAL FLOW
  if(approvalRows.length > 0){

    await fetch(API_URL,{
      method:"POST",
      body: JSON.stringify({
        action: approvalAction === "approve" ? "approveGuest" : "rejectGuest",
        rows: approvalRows,
        host: data.name
      })
    });

    approvalRows = [];
    approvalAction = "";

document.getElementById("approvalPanel").style.display="none";

await loadPendingCount();

return;
  }

  // 🟢 NORMAL FLOW
  await finalizeSubmissionAfterPin();
}else{
    alert("Invalid PIN");
  }

}

async function finalizeSubmissionAfterPin(){

  closePinModal();

  if(!window.pendingAttendancePayload){
    return;
  }

  // Add Host-approved guests
  const approvedNames = window.pendingAttendancePayload.names
      ? window.pendingAttendancePayload.names.split(", ").filter(x=>x)
      : [];

  pendingGuestsGlobal.forEach(g=>{
    approvedNames.push(g);
  });

  // Update payload
  window.pendingAttendancePayload.names = approvedNames.join(", ");
  window.pendingAttendancePayload.arrived =
      window.pendingAttendancePayload.registered +
      pendingGuestsGlobal.length;

  window.pendingAttendancePayload.extra =
      pendingGuestsGlobal.length;

  // Write attendance
  let res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(window.pendingAttendancePayload)
  });

  let result = await res.json();

  if(result.duplicate){
    showDuplicateMessage(window.pendingAttendancePayload.names);
    return;
  }

  scannedFamilies[currentFamilyId] =
      window.pendingAttendancePayload.names;

  lastScanned = currentFamilyId;

  scanLock = true;

  approvedOverrides = [];

  await loadPendingCount();

  document.getElementById("familyCard").innerHTML = `

<div style="
background:#2e7d32;
color:white;
padding:40px;
border-radius:12px;
margin-top:20px;
text-align:center;
">

</div>

${window.pendingAttendancePayload.names}
</div>

<div style="font-size:20px;font-weight:bold;margin-bottom:30px">
Host Approval Granted
</div>

<button
onclick="
scanLock=false;
resetScanner();
"
style="
background:white;
color:black;
border:none;
border-radius:8px;
font-size:22px;
padding:14px 28px;
">
SCAN NEXT GUEST
</button>

</div>
`;

}

function selectFamily(fid){

    closeGuestPanel();

    document.getElementById("familyCard").innerHTML = "";

    collapseCamera();

    if(familyCache[fid]){
        renderFamily(familyCache[fid]);
    }else{
        loadFamily(fid);
    }

}

function selectUnknownGuest(){

    closeGuestPanel();

    if (guestSearchMode == "family") {

    if (!displayedGuests.some(g =>
    g.name.toUpperCase() === enteredGuestName.toUpperCase()
)) {

    displayedGuests.push({

        name: enteredGuestName,

        attending: true,

        expected: false,

        extra: true

    });

}

    renderFamily({

        family: currentFamilyId,

        familyName: currentFamilyName,

        members: displayedGuests

    });

    return;

}

    // Total stranger (not accompanying any family)

    currentFamilyId = "";

    currentFamilyName = "Unknown";

    pendingGuestsGlobal = [enteredGuestName];

    pendingFamilyGlobal = "Unknown";

    window.pendingAttendancePayload = null;

    openPinModal(
        pendingGuestsGlobal,
        "Unknown"
    );

}
