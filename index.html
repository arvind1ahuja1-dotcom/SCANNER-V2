<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#fafafa;
padding:40px;
}

.login-box{
max-width:400px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:14px;
font-size:18px;
margin-top:10px;
margin-bottom:20px;
}

button{
padding:16px;
font-size:18px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div class="login-box">
<h2>TEST VERSION 99</h2>

<input id="mobile" type="tel" maxlength="10" placeholder="Mobile Number" oninput="checkLoginReady()">

<input id="password" type="password" maxlength="6" placeholder="6 Digit PIN" oninput="checkLoginReady()">

<button id="loginBtn" onclick="login()" disabled style="opacity:0.4;">
Login
</button>

</div>

<script>

function loadScanner(){

document.body.innerHTML = `

<h2>Wedding Entry Scanner</h2>

<div id="reader" style="width:320px;margin:auto;"></div>

<div id="scanResult" style="margin-top:30px;font-size:22px;"></div>

`;

startScanner();

}

function startScanner(){

const scanner = new Html5Qrcode("reader");

scanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },
onScanSuccess
).catch(err=>{
document.getElementById("scanResult").innerHTML =
"Camera error: " + err;
});

}

function onScanSuccess(decodedText){

document.getElementById("scanResult").innerHTML =
"<b>QR Scanned:</b><br>"+decodedText;

}

function checkLoginReady(){

const mobile = document.getElementById("mobile").value.trim();
const password = document.getElementById("password").value.trim();
const button = document.getElementById("loginBtn");

if(mobile.length === 10 && password.length === 6){
button.disabled = false;
button.style.opacity = "1";
}else{
button.disabled = true;
button.style.opacity = "0.4";
}

}
  
async function login(){

const mobile = document.getElementById("mobile").value.trim();
const password = document.getElementById("password").value.trim();

try{

const res = await fetch(
"https://script.google.com/macros/s/AKfycbwtFe1jh52oGJniIfoUyoqMhd0Vf0PoCwDeIXRWgBjrbfiqqXxR9wYGM-QqE2Wh4QA7/exec?api=1",
{
method:"POST",
body: new URLSearchParams({
action:"login",
mobile:mobile,
password:password
})
}
);

const data = await res.json();

if(data.status === "SUCCESS"){
loadScanner();
}
else{
alert("Invalid mobile or PIN");
}

}
catch(err){
alert("Connection error: " + err);
}

}

</script>

</body>
</html>
