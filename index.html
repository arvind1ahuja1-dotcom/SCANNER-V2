<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

input{
font-size:22px;
padding:10px;
margin:10px;
width:250px;
}

button{
font-size:22px;
padding:15px;
margin:10px;
}

.member{
display:flex;
justify-content:space-between;
width:320px;
margin:auto;
font-size:22px;
}

.green{background:#2e7d32;color:white;height:100vh;}
.yellow{background:#f9a825;height:100vh;}
</style>

</head>

<body>

<div id="login">

<h2>Scanner Login</h2>

<input id="mobile" placeholder="Mobile" maxlength="10" inputmode="numeric"><br>

<input id="pin" placeholder="PIN" maxlength="6" inputmode="numeric"><br>

<button onclick="login()">OKAY</button>

</div>

<div id="scanner" style="display:none">

<h3 id="func"></h3>

<div id="reader" style="width:320px;margin:auto"></div>

<div id="result"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwtFe1jh52oGJniIfoUyoqMhd0Vf0PoCwDeIXRWgBjrbfiqqXxR9wYGM-QqE2Wh4QA7/exec";

let user=null;
let activeFunction=null;

async function login(){

let mobile=document.getElementById("mobile").value;
let pin=document.getElementById("pin").value;

let res=await fetch(API_URL+
"?action=login&mobile="+mobile+"&pin="+pin);

let data=await res.json();

if(!data.success){
alert("Incorrect Mobile or PIN");
return;
}

user=data.name;

document.getElementById("login").style.display="none";
document.getElementById("scanner").style.display="block";

loadFunction();

}

async function loadFunction(){

let res=await fetch(API_URL+"?action=function");

let data=await res.json();

if(!data.active){
alert("No active function");
return;
}

activeFunction=data.functionId;

document.getElementById("func").innerText=data.functionName;

}

function onScanSuccess(decoded){

let lines=decoded.split("\n");

let familyId=lines[0].trim();

loadFamily(familyId);

}

async function loadFamily(fid){

let res=await fetch(API_URL+"?action=family&family="+fid);

let members=await res.json();

let html="<h3>"+fid+"</h3>";

members.forEach((m,i)=>{

if(m.functionId!=activeFunction) return;

html+=`
<div class="member">
<span>${m.name}</span>
<input type="checkbox" checked id="m${i}">
</div>
`;
});

html+=`
<button onclick="submit('${fid}')">Submit</button>
`;

document.getElementById("result").innerHTML=html;

}

async function submit(fid){

let boxes=document.querySelectorAll("input[type=checkbox]");

let names=[];
let arrived=0;

boxes.forEach(b=>{
if(b.checked){
arrived++;
names.push(b.parentElement.innerText.trim());
}
});

let payload={
action:"submit",
functionId:activeFunction,
familyId:fid,
primary:names[0],
family:"",
registered:boxes.length,
arrived:arrived,
extra:0,
members:names.join(","),
device:user,
method:"QR Scan"
};

let res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});

let data=await res.json();

if(data.duplicate){
alert("Already checked in");
return;
}

document.body.className="green";
document.body.innerHTML="<h1>WELCOME</h1>";

}

const scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
