<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

#scanner{
position:relative;
}

#reader{
min-height:0;
}
  
#reader video,
#reader img{
max-height:320px !important;
object-fit:contain;
}
  
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

input{
font-size:22px;
padding:10px;
margin:10px;
width:240px;
}

button{
font-size:22px;
padding:14px;
margin:10px;
}

.member{
display:flex;
justify-content:space-between;
align-items:center;
width:92%;
max-width:500px;
margin:10px auto;
font-size:24px;
padding:8px 10px;
}

.green{
background:#2e7d32;
color:white;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}

</style>

</head>

<body>

<div id="login">

<h2>Scanner Login</h2>

<input id="mobile" maxlength="10" inputmode="numeric"
placeholder="Mobile"
oninput="validateLogin()">

<br>

<input id="pin" maxlength="6" inputmode="numeric"
placeholder="PIN"
oninput="validateLogin()">

<br>

<button id="loginBtn"
onclick="login()"
disabled
style="background:#9ccc65;color:white">

OKAY

</button>

<p id="msg" style="color:red"></p>

</div>


<div id="scanner" style="display:none">

<h3 id="functionTitle"></h3>

<div id="reader" style="width:320px;margin:auto;"></div>

<div id="familyCard"></div>

</div>


<script>

let lastScanned = "";

let scannerInstance=null;

let scannedFamilies = {};

const API_URL="https://script.google.com/macros/s/AKfycbwfBi1pESnwh8ZMSDPLATpjZHEMV3npR6146FfdMOSrbXvTlJ7f7g4ZmG1dojHulhY/exec";

const SESSION_HOURS = 6;

let userName="";
let activeFunction="";

window.onload = function(){

let user = localStorage.getItem("scannerUser");
let time = localStorage.getItem("loginTime");

if(user && time){

let diff = (Date.now() - time) / 3600000;

if(diff < SESSION_HOURS){

userName = user;

document.getElementById("login").style.display="none";
document.getElementById("scanner").style.display="block";

loadFunction();

}

}

}

function validateLogin(){

let m=document.getElementById("mobile").value;
let p=document.getElementById("pin").value;
let btn=document.getElementById("loginBtn");

if(m.length==10 && p.length==6){

btn.disabled=false;
btn.style.background="#2e7d32";

}else{

btn.disabled=true;
btn.style.background="#9ccc65";

}

}


async function login(){

document.getElementById("msg").innerText="Connecting...";

let mobile=document.getElementById("mobile").value;
let pin=document.getElementById("pin").value;

try{

let res=await fetch(API_URL+"?action=login&mobile="+mobile+"&pin="+pin);

let data=await res.json();

if(!data.success){

document.getElementById("msg").innerText="Incorrect Mobile or PIN";
return;

}

userName=data.name;

/* SAVE SESSION */
localStorage.setItem("scannerUser", userName);
localStorage.setItem("loginTime", Date.now());

document.getElementById("login").style.display="none";
document.getElementById("scanner").style.display="block";

loadFunction();

}catch(err){

document.getElementById("msg").innerText="Connection error: "+err;

}

}
  
async function loadFunction(){

let res=await fetch(API_URL+"?action=active");

let data=await res.json();

if(!data.active){

alert("No active function");
return;

}

activeFunction=data.id;

document.getElementById("functionTitle").innerText=data.name;

resetScanner();

/* preload attendance log */
preloadAttendance();

}

let scanLock=false;
  

async function onScan(decoded){

if(scanLock) return;

scanLock = true;

let lines = (decoded || "").split("\n");
let familyId = (lines[0] || "").replace("\r","").trim();

/* ignore repeated scans of same QR */
if(familyId === lastScanned){
scanLock = false;
return;
}

lastScanned = familyId;

/* invalid QR check */

if(!familyId.startsWith("FAM")){
showInvalidQR();
scanLock=false;
return;
}

/* duplicate check */

if(scannedFamilies[familyId]){

showDuplicateMessage(scannedFamilies[familyId]);

scanLock=false;

return;
}

/* collapse camera box */
collapseCamera();

await loadFamily(familyId);

}


async function loadFamily(fid){

let res;
try{
res=await fetch(API_URL+"?action=family&family="+fid+"&func="+activeFunction);
}catch(err){
alert("Network error. Please scan again.");
resetScanner();
return;
}

let data=await res.json();

if(!data || !data.members){
alert("Unable to load family data");
resetScanner();
return;
}

let html=`
<div class="familyCard">

<h3 style="margin-bottom:25px">
${data.members.length ? data.members[0].name : ""} ${data.familyName} Family
</h3>

<div style="margin-bottom:18px;font-size:18px;color:#444">
Tap Name of Absent guests to remove Tick
</div>
`;

data.members.forEach((m,i)=>{

html+=`
<label class="member">
<span>${m.name}</span>
<input type="checkbox" checked id="m${i}">
</label>
`;

});

html+=`
<div style="display:flex;justify-content:space-between;margin-top:25px">

<button
style="
background:#ed6c02;
color:white;
padding:14px 20px;
border:none;
font-size:20px;
border-radius:8px
"
>
+ Guests
</button>

<button
onclick="submit('${data.family}','${data.familyName}')"
style="
background:#2e7d32;
color:white;
padding:14px 20px;
border:none;
font-size:20px;
border-radius:8px
"
>
SUBMIT
</button>

</div>
`;

document.getElementById("familyCard").innerHTML=html;

}


async function submit(fid,fname){

let boxes=document.querySelectorAll("input[type=checkbox]");

let names=[];
let arrived=0;

boxes.forEach(b=>{

if(b.checked){
arrived++;

let parent = b.closest(".member");
if(parent){
let span = parent.querySelector("span");
if(span){
names.push(span.innerText.trim());
}
}

}

});

if(names.length === 0){
alert("At least one guest must be present.");
return;
}
  
let payload={
action:"submit",
func:activeFunction,
family:fid,
primary:document.querySelector(".member span")?.innerText || "",
familyName:fname,
registered:boxes.length,
arrived:arrived,
extra:0,
names:names.join(", "),
device:userName,
method:"QR Scan"
};

let res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});

let data=await res.json();

if(data.duplicate){
showDuplicateMessage(names.join(", "));
resetScanner();
return;
}

/* update local attendance cache */
scannedFamilies[fid]=names.join(", ");

/* prevent same QR from firing again */
lastScanned = fid;
  
let color = (arrived==boxes.length) ? "#2e7d32" : "#ed6c02";

document.getElementById("familyCard").innerHTML = `

<div style="
background:${color};
color:white;
padding:40px;
border-radius:12px;
margin-top:20px;
text-align:center;
">

<h1 style="font-size:42px;margin-bottom:20px">
WELCOME
</h1>

<div style="font-size:26px;margin-bottom:30px">
${document.querySelector(".member span").innerText} ${fname} Family
</div>

<button
style="
font-size:22px;
padding:14px 28px;
background:white;
border:none;
border-radius:8px;
cursor:pointer;
"
onclick="resetScanner()"
>
SCAN NEXT GUEST
</button>

</div>
`;

}

function collapseCamera(){

if(scannerInstance){
try{ scannerInstance.clear(); }catch(e){}
}

const reader = document.getElementById("reader");
reader.innerHTML="";
reader.style.height="0px";
}

function resetScanner(){

let warn = document.getElementById("dupWarning");
if(warn) warn.remove();

if(scannerInstance){
try{ scannerInstance.clear(); }catch(e){}
}

/* reset scan guards */
scanLock = false;
lastScanned = "";

document.getElementById("reader").style.height="320px";
  
document.getElementById("familyCard").innerHTML="";

/* show scanner controls again */
document.getElementById("reader").style.display="block";

/* clear scanner area */
const reader=document.getElementById("reader");
reader.innerHTML="";

/* recreate scanner UI but DO NOT auto-start camera */
scannerInstance = new Html5QrcodeScanner(
"reader",
{
fps:30,
qrbox:{width:320,height:320},
rememberLastUsedCamera:true,
supportedScanTypes:[
Html5QrcodeScanType.SCAN_TYPE_CAMERA,
Html5QrcodeScanType.SCAN_TYPE_FILE
],
formatsToSupport:[
Html5QrcodeSupportedFormats.QR_CODE
]
},
false
);

scannerInstance.render(onScan);

}

function showDuplicateMessage(names){

scanLock = true;

const container = document.getElementById("scanner");

let old = document.getElementById("dupWarning");
if(old) old.remove();

let msg = document.createElement("div");
msg.id="dupWarning";

msg.style.color="#c62828";
msg.style.fontSize="16px";
msg.style.fontWeight="bold";
msg.style.marginTop="8px";
msg.style.textAlign="center";
msg.style.position="absolute";
msg.style.top="75vh";
msg.style.left="0";
msg.style.right="0";
msg.style.zIndex="999";

msg.innerHTML =
`QR ALREADY SCANNED FOR ${document.getElementById("functionTitle").innerText}<br>
Guests: ${names}`;

container.appendChild(msg);

setTimeout(()=>{
msg.remove();
scanLock=false;
lastScanned = "";
},5000);

}

function showInvalidQR(){

scanLock = true;

const container = document.getElementById("scanner");

let old = document.getElementById("dupWarning");
if(old) old.remove();

let msg = document.createElement("div");
msg.id="dupWarning";

msg.style.color="#c62828";
msg.style.fontSize="16px";
msg.style.fontWeight="bold";
msg.style.marginTop="8px";
msg.style.textAlign="center";
msg.style.position="absolute";
msg.style.top="75vh";
msg.style.left="0";
msg.style.right="0";
msg.style.zIndex="999";

msg.innerHTML = `INVALID QR CODE`;

container.appendChild(msg);

setTimeout(()=>{
msg.remove();
scanLock=false;
},5000);

}

async function preloadAttendance(){

try{

let res = await fetch(API_URL+"?action=attendance&func="+activeFunction,{cache:"no-store"});
let data = await res.json();

/* store scanned families in memory */
scannedFamilies = {};

data.forEach(r=>{
scannedFamilies[r.family]=r.names;
});

}catch(err){
console.log("Attendance preload failed",err);
}

}

  
</script>

</body>
</html>
