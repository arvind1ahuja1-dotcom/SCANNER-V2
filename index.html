<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

input{
font-size:22px;
padding:10px;
margin:10px;
width:240px;
}

button{
font-size:22px;
padding:14px;
margin:10px;
}

.member{
display:flex;
justify-content:space-between;
align-items:center;
width:92%;
max-width:500px;
margin:10px auto;
font-size:24px;
padding:8px 10px;
}

#reader{
display:flex;
justify-content:center;
align-items:center;
margin:auto;
}

#reader video{
width:250px !important;
height:250px !important;
object-fit:cover;
border-radius:10px;
}

.green{
background:#2e7d32;
color:white;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}

</style>

</head>

<body>

<div id="login">

<h2>Scanner Login</h2>

<input id="mobile" maxlength="10" inputmode="numeric"
placeholder="Mobile"
oninput="validateLogin()">

<br>

<input id="pin" maxlength="6" inputmode="numeric"
placeholder="PIN"
oninput="validateLogin()">

<br>

<button id="loginBtn"
onclick="login()"
disabled
style="background:#9ccc65;color:white">

OKAY

</button>

<p id="msg" style="color:red"></p>

</div>


<div id="scanner" style="display:none">

<h3 id="functionTitle"></h3>

<div id="reader" style="width:320px;margin:auto;"></div>

<div id="familyCard"></div>

</div>


<script>

let scanner=null;

const API_URL="https://script.google.com/macros/s/AKfycbwfBi1pESnwh8ZMSDPLATpjZHEMV3npR6146FfdMOSrbXvTlJ7f7g4ZmG1dojHulhY/exec";

const SESSION_HOURS = 6;

let userName="";
let activeFunction="";

window.onload = function(){

let user = localStorage.getItem("scannerUser");
let time = localStorage.getItem("loginTime");

if(user && time){

let diff = (Date.now() - time) / 3600000;

if(diff < SESSION_HOURS){

userName = user;

document.getElementById("login").style.display="none";
document.getElementById("scanner").style.display="block";

loadFunction();

}

}

}

function validateLogin(){

let m=document.getElementById("mobile").value;
let p=document.getElementById("pin").value;
let btn=document.getElementById("loginBtn");

if(m.length==10 && p.length==6){

btn.disabled=false;
btn.style.background="#2e7d32";

}else{

btn.disabled=true;
btn.style.background="#9ccc65";

}

}


async function login(){

document.getElementById("msg").innerText="Connecting...";

let mobile=document.getElementById("mobile").value;
let pin=document.getElementById("pin").value;

try{

let res=await fetch(API_URL+"?action=login&mobile="+mobile+"&pin="+pin);

let data=await res.json();

if(!data.success){

document.getElementById("msg").innerText="Incorrect Mobile or PIN";
return;

}

userName=data.name;

/* SAVE SESSION */
localStorage.setItem("scannerUser", userName);
localStorage.setItem("loginTime", Date.now());

document.getElementById("login").style.display="none";
document.getElementById("scanner").style.display="block";

loadFunction();

}catch(err){

document.getElementById("msg").innerText="Connection error: "+err;

}

}

async function loadFunction(){

let res=await fetch(API_URL+"?action=active");

let data=await res.json();

if(!data.active){

alert("No active function");
return;

}

activeFunction=data.id;

document.getElementById("functionTitle").innerText=data.name;

showScannerControls();

}

function showScannerControls(){
document.getElementById("reader").innerHTML="";

const reader=document.getElementById("reader");

reader.innerHTML="";

if(!scanner){

scanner=new Html5QrcodeScanner(
"reader",
{
fps:20,
qrbox:{width:250,height:250},
rememberLastUsedCamera:true,
supportedScanTypes:[
Html5QrcodeScanType.SCAN_TYPE_CAMERA,
Html5QrcodeScanType.SCAN_TYPE_FILE
],
formatsToSupport:[
Html5QrcodeSupportedFormats.QR_CODE
]
},
false
);

scanner.render(onScan);

}

}

function startScanner(){

scanLock=false;

const scanner = new Html5QrcodeScanner(
"reader",
{
fps: 15,
qrbox: {width:250,height:250},
rememberLastUsedCamera:true,
supportedScanTypes:[
Html5QrcodeScanType.SCAN_TYPE_CAMERA,
Html5QrcodeScanType.SCAN_TYPE_FILE
],
formatsToSupport:[
Html5QrcodeSupportedFormats.QR_CODE
]
},
false
);

scanner.render(onScan);

}

let scanLock=false;

function onScan(decoded){

if(scanLock) return;

scanLock = true;

let lines = decoded.split("\n");
let familyId = lines[0].replace("\r","").trim();

/* collapse camera box */
collapseCamera();

loadFamily(familyId);

}


async function loadFamily(fid){

let res=await fetch(API_URL+
"?action=family&family="+fid+"&func="+activeFunction);

let data=await res.json();

let html=`
<div class="familyCard">

<h3 style="margin-bottom:25px">
${data.members[0].name} ${data.familyName} Family
</h3>

<div style="margin-bottom:25px;font-size:18px;color:#444">
Click name or tick box to untick absent guest
</div>
`;

data.members.forEach((m,i)=>{

html+=`
<label class="member">
<span>${m.name}</span>
<input type="checkbox" checked id="m${i}">
</label>
`;

});

html+=`
<div style="display:flex;justify-content:space-between;margin-top:25px">

<button
style="
background:#ed6c02;
color:white;
padding:14px 20px;
border:none;
font-size:20px;
border-radius:8px
"
>
+ Guests
</button>

<button
onclick="submit('${data.family}','${data.familyName}')"
style="
background:#2e7d32;
color:white;
padding:14px 20px;
border:none;
font-size:20px;
border-radius:8px
"
>
SUBMIT
</button>

</div>
`;

document.getElementById("familyCard").innerHTML=html;

}


async function submit(fid,fname){

let boxes=document.querySelectorAll("input[type=checkbox]");

let names=[];
let arrived=0;

boxes.forEach(b=>{

if(b.checked){
arrived++;
names.push(
b.closest(".member").querySelector("span").innerText.trim()
);
}

});

if(names.length === 0){
alert("At least one guest must be present.");
return;
}

let payload={
action:"submit",
func:activeFunction,
family:fid,
primary:document.querySelector(".member span").innerText,
familyName:fname,
registered:boxes.length,
arrived:arrived,
extra:0,
names:names.join(", "),
device:userName,
method:"QR Scan"
};

let res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});

let data=await res.json();

if(data.duplicate){

alert("Family already checked in");
return;

}

let color = (arrived==boxes.length) ? "#2e7d32" : "#ed6c02";

document.getElementById("familyCard").innerHTML = `

<div style="
background:${color};
color:white;
padding:40px;
border-radius:12px;
margin-top:20px;
text-align:center;
">

<h1 style="font-size:42px;margin-bottom:20px">
WELCOME
</h1>

<div style="font-size:26px;margin-bottom:30px">
${document.querySelector(".member span").innerText} ${fname} Family
</div>

<button
style="
font-size:22px;
padding:14px 28px;
background:white;
border:none;
border-radius:8px;
cursor:pointer;
"
onclick="resetScanner()"
>
SCAN NEXT GUEST
</button>

</div>
`;

}

function collapseCamera(){

let video=document.querySelector("#reader video");

if(video){
video.remove();
}

}

function resetScanner(){

document.getElementById("familyCard").innerHTML="";

const reader=document.getElementById("reader");

reader.style.display="block";
reader.innerHTML="";

scanLock=false;

if(!scanner){

scanner=new Html5QrcodeScanner(
"reader",
{
fps:20,
qrbox:{width:250,height:250},
rememberLastUsedCamera:true,
supportedScanTypes:[
Html5QrcodeScanType.SCAN_TYPE_CAMERA,
Html5QrcodeScanType.SCAN_TYPE_FILE
],
formatsToSupport:[
Html5QrcodeSupportedFormats.QR_CODE
]
},
false
);

scanner.render(onScan);

}

}

</script>

</body>
</html>
