<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

input{
font-size:22px;
padding:10px;
margin:10px;
width:240px;
}

button{
font-size:22px;
padding:14px;
margin:10px;
}

.member{
display:flex;
justify-content:space-between;
width:320px;
margin:auto;
font-size:22px;
padding:6px;
}

.green{
background:#2e7d32;
color:white;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
}

</style>

</head>

<body>

<div id="login">

<h2>Scanner Login</h2>

<input id="mobile" maxlength="10" inputmode="numeric"
placeholder="Mobile"
oninput="validateLogin()">

<br>

<input id="pin" maxlength="6" inputmode="numeric"
placeholder="PIN"
oninput="validateLogin()">

<br>

<button id="loginBtn"
onclick="login()"
disabled
style="background:#9ccc65;color:white">

OKAY

</button>

<p id="msg" style="color:red"></p>

</div>


<div id="scanner" style="display:none">

<h3 id="functionTitle"></h3>

<div id="reader" style="width:320px;margin:auto"></div>

<div id="familyCard"></div>

</div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbwfBi1pESnwh8ZMSDPLATpjZHEMV3npR6146FfdMOSrbXvTlJ7f7g4ZmG1dojHulhY/exec";

let userName="";
let activeFunction="";


function validateLogin(){

let m=document.getElementById("mobile").value;
let p=document.getElementById("pin").value;
let btn=document.getElementById("loginBtn");

if(m.length==10 && p.length==6){

btn.disabled=false;
btn.style.background="#2e7d32";

}else{

btn.disabled=true;
btn.style.background="#9ccc65";

}

}


async function login(){

let mobile=document.getElementById("mobile").value;
let pin=document.getElementById("pin").value;

document.getElementById("msg").innerText="Checking login...";

try{

let url = API_URL + "?action=login&mobile=" + mobile + "&pin=" + pin;

console.log(url);

let res = await fetch(url);

let text = await res.text();

console.log(text);

document.getElementById("msg").innerText=text;

let data = JSON.parse(text);

if(!data.success){

alert("Mobile or PIN not authorised");

return;

}

userName=data.name;

document.getElementById("login").style.display="none";
document.getElementById("scanner").style.display="block";

loadFunction();

}
catch(e){

document.getElementById("msg").innerText="Login error: "+e;

}

}


async function loadFunction(){

let res=await fetch(API_URL+"?action=active");

let data=await res.json();

if(!data.active){

alert("No active function");
return;

}

activeFunction=data.id;

document.getElementById("functionTitle").innerText=data.name;

startScanner();

}


function startScanner(){

const scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScan);

}


function onScan(decoded){

let lines=decoded.split("\n");

let familyId=lines[0].trim();

loadFamily(familyId);

}


async function loadFamily(fid){

let res=await fetch(API_URL+
"?action=family&family="+fid+"&func="+activeFunction);

let data=await res.json();

let html="<h3>"+data.familyName+" Family</h3>";

data.members.forEach((m,i)=>{

html+=`
<div class="member">
<span>${m.name}</span>
<input type="checkbox" checked id="m${i}">
</div>
`;

});

html+=`<button onclick="submit('${data.family}','${data.familyName}')">Submit</button>`;

document.getElementById("familyCard").innerHTML=html;

}


async function submit(fid,fname){

let boxes=document.querySelectorAll("input[type=checkbox]");

let names=[];
let arrived=0;

boxes.forEach(b=>{

if(b.checked){
arrived++;
names.push(b.parentElement.innerText.trim());
}

});

let payload={
action:"submit",
func:activeFunction,
family:fid,
primary:names[0],
familyName:fname,
registered:boxes.length,
arrived:arrived,
extra:0,
names:names.join(", "),
device:userName,
method:"QR Scan"
};

let res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});

let data=await res.json();

if(data.duplicate){

alert("Family already checked in");
return;

}

document.body.className="green";
document.body.innerHTML="<h1>WELCOME</h1>";

}

</script>

</body>
</html>
