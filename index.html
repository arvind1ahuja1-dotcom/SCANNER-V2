<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#fafafa;
padding:40px;
}

.login-box{
max-width:400px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:14px;
font-size:18px;
margin-top:10px;
margin-bottom:20px;
}

button{
padding:16px;
font-size:18px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div class="login-box">

<div class="login-box">
<h2>TEST VERSION 99</h2>

<input id="mobile" type="tel" maxlength="10" placeholder="Mobile Number">

<input id="password" type="password" maxlength="6" placeholder="6 Digit PIN">

<button onclick="login()">Login</button>

</div>

<script>

async function login(){

const mobile = document.getElementById("mobile").value.trim();
const password = document.getElementById("password").value.trim();

const res = await fetch(
"https://script.google.com/macros/s/AKfycbwtFe1jh52oGJniIfoUyoqMhd0Vf0PoCwDeIXRWgBjrbfiqqXxR9wYGM-QqE2Wh4QA7/exec",
{
method:"POST",
headers:{ "Content-Type":"application/json"},
body: JSON.stringify({
action:"login",
mobile:mobile,
password:password
})
}
);

const data = await res.json();

if(data.status === "SUCCESS"){
alert("Login successful");
}else{
alert("Invalid login");
}

}

</script>

</body>
</html>
