<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#fafafa;
padding:40px;
}

.login-box{
max-width:400px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:14px;
font-size:18px;
margin-top:10px;
margin-bottom:20px;
}

button{
padding:16px;
font-size:18px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div class="login-box">

<h2>TEST VERSION 99</h2>

<input id="mobile" type="tel" maxlength="10" placeholder="Mobile Number" oninput="checkLoginReady()">

<input id="password" type="password" maxlength="6" placeholder="6 Digit PIN" oninput="checkLoginReady()">

<button id="loginBtn" onclick="login()" disabled style="opacity:0.4;">
Login
</button>

</div>

<script>

let html5QrCode;
let scanLocked = false;

function loadScanner(){

document.body.innerHTML = `

<h2>Wedding Entry Scanner</h2>

<div id="reader" style="width:320px;margin:auto;"></div>

<div style="margin-top:20px;">
<button onclick="openGallery()" style="
padding:12px 20px;
font-size:18px;
background:#1976d2;
color:white;
border:none;
border-radius:6px;
cursor:pointer;">
Scan From Photo
</button>
</div>

<input type="file" id="qrFileInput" accept="image/*" style="display:none">

<div id="scanResult" style="margin-top:30px;font-size:22px;"></div>

<div style="margin-top:20px;">
<button onclick="resetScanner()" style="
padding:12px 20px;
font-size:18px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
cursor:pointer;">
Scan Next Guest
</button>
</div>

`;

startScanner();

/* attach listener AFTER element exists */

document.getElementById("qrFileInput").addEventListener("change", function(){

const file = this.files[0];

if(!file) return;

html5QrCode.scanFile(file, true)
.then(decodedText => {

scanLocked = true;

onScanSuccess(decodedText);

})
.catch(err => {

document.getElementById("scanResult").innerHTML =
"QR not detected in image.";

});

});

}

function startScanner(){

html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode: "environment" },
{ fps: 10, qrbox: 250 },
(decodedText) => {

if(scanLocked) return;

scanLocked = true;

onScanSuccess(decodedText);

}
).catch(err => {

document.getElementById("scanResult").innerHTML =
"Camera error: " + err;

});

}

function onScanSuccess(decodedText){

if(html5QrCode){
html5QrCode.stop();
}

document.getElementById("scanResult").innerHTML =
"<b>QR Detected:</b><br><pre>"+decodedText+"</pre>";

}

function resetScanner(){

scanLocked = false;

loadScanner();

}

function checkLoginReady(){

const mobile = document.getElementById("mobile").value.trim();
const password = document.getElementById("password").value.trim();
const button = document.getElementById("loginBtn");

if(mobile.length === 10 && password.length === 6){
button.disabled = false;
button.style.opacity = "1";
}else{
button.disabled = true;
button.style.opacity = "0.4";
}

}

async function login(){

const mobile = document.getElementById("mobile").value.trim();
const password = document.getElementById("password").value.trim();

try{

const res = await fetch(
"https://script.google.com/macros/s/AKfycbwtFe1jh52oGJniIfoUyoqMhd0Vf0PoCwDeIXRWgBjrbfiqqXxR9wYGM-QqE2Wh4QA7/exec?api=1",
{
method:"POST",
body: new URLSearchParams({
action:"login",
mobile:mobile,
password:password
})
}
);

const data = await res.json();

if(data.status === "SUCCESS"){
loadScanner();
}
else{
alert("Invalid mobile or PIN");
}

}
catch(err){
alert("Connection error: " + err);
}

}

function openGallery(){

if(html5QrCode){
html5QrCode.stop().then(() => {

document.getElementById("qrFileInput").click();

}).catch(err => {

document.getElementById("scanResult").innerHTML =
"Camera stop error: " + err;

});
}
else{

document.getElementById("qrFileInput").click();

}

}

</script>

</body>
</html>
